name: Run tests

on:
  pull_request:

jobs:
  run_tests:
    runs-on: ubuntu-latest

    strategy:
      # Run every Python version to completion even if one fails. The test job
      # occasionally hits a flaky native SIGILL during import on a mismatched
      # runner CPU/wheel; with fail-fast that one crash cancels the other
      # versions and hides their real status. Keeping it false isolates the
      # flake so you can re-run just the failed job (`gh run rerun --failed`).
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.5"
          # enable-cache: true
          # cache-dependency-glob: "pyproject.toml pdm.lock"

      - name: Clear all caches
        run: |
            rm -rf ~/.cache/pip
            rm -rf ~/.cache/uv
            rm -rf ~/.cache/conda
            rm -rf ~/.cache/npm

      - name: Install package
        run: uv sync --all-groups --reinstall
        env:
          # UV_CACHE_DIR: ""
          PIP_NO_CACHE_DIR: "1"

      - name: Run pytest
        run: uv run pytest

      - name: Check styling
        run: uv run ruff format --check .

      - name: Linting
        run: uv run ruff check src/lanfactory

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test_notebooks:
    name: Execute tutorial notebooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.5"

      - name: Install package (with notebook + backend deps)
        run: uv sync --all-groups

      # Runs the 4 Jupyter basic tutorials (via nbconvert) and the 2 marimo export
      # tutorials (via `marimo export`) so the tutorials cannot silently drift out
      # of sync with the code again.
      #
      # Retried a few times: this repo's native deps (jax/torch/...) occasionally
      # SIGILL on import on some runner CPUs (see CLAUDE.md). That crash happens
      # before any notebook runs, so a fresh re-import rides through it.
      - name: Execute tutorial notebooks
        run: |
          for attempt in 1 2 3; do
            echo "Notebook execution attempt ${attempt}/3..."
            uv run pytest tests/test_notebooks.py --run-notebooks --no-cov -v && exit 0
            echo "Attempt ${attempt} failed (likely the transient native SIGILL-on-import flake); retrying..."
          done
          exit 1
